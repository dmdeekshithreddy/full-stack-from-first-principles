    <button id="likeBtn">👍 Like</button>

    <script>
      // 1. Find the elements in the DOM
      const likeBtn = document.getElementById("likeBtn");
      const likeCount = document.getElementById("likeCount");

      // 2. State lives in JavaScript memmory while page is open
      let likes = 0;
      //   let liked = false;

      // 3. Listen for click events on the like button
      likeBtn.addEventListener("click", () => {
        // if (!liked) {
        likes++;
        //   liked = true;
        // }
        likeCount.textContent = `${likes} likes`;
        // liked = false;
      });
    </script>
  </body>
